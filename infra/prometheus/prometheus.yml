global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: firedrill-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:4000
        labels:
          service: api

  - job_name: firedrill-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:4001
        labels:
          service: worker

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
